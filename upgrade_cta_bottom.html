<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upgrade CTA Bottom</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { margin: 0; overflow: hidden; }

  body {
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    padding: 0 16px 16px;
  }

  .card {
    background: #f8f9fb;
    border: 1.5px solid #e2e8f0;
    border-radius: 16px;
    overflow: hidden;
  }

  .top-bar {
    background: linear-gradient(135deg, #334155 0%, #1e2d3d 100%);
    height: 5px;
  }

  .content {
    padding: 24px 24px 20px;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 10px;
  }

  .headline {
    font-size: 18px;
    font-weight: 700;
    color: #1e2d3d;
    line-height: 1.3;
    margin-bottom: 16px;
    letter-spacing: -0.02em;
  }

  .modules {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }

  .module {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .module-icon {
    font-size: 16px;
    flex-shrink: 0;
  }

  .module-text {
    font-size: 13px;
    font-weight: 500;
    color: #334155;
  }

  .divider {
    border: none;
    border-top: 1px solid #e2e8f0;
    margin-bottom: 18px;
  }

  .btn-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .btn-primary {
    background: linear-gradient(135deg, #334155 0%, #1e2d3d 100%);
    color: #ffffff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 24px;
    border-radius: 10px;
    text-decoration: none;
    display: inline-block;
    transition: all 0.2s ease;
    letter-spacing: -0.01em;
    flex-shrink: 0;
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(51,65,85,0.3);
  }

  .note {
    font-size: 12px;
    color: #94a3b8;
    line-height: 1.4;
  }

  @media (max-width: 420px) {
    .modules { grid-template-columns: 1fr; }
    .btn-row { flex-direction: column; align-items: flex-start; }
    .btn-primary { width: 100%; text-align: center; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="top-bar"></div>
    <div class="content">
      <div class="eyebrow">Dein nächster Schritt</div>
      <div class="headline">Dein vollständiges Heldenprofil wartet – jetzt freischalten</div>

      <div class="modules">
        <div class="module">
          <span class="module-icon">🧭</span>
          <span class="module-text">Identität</span>
        </div>
        <div class="module">
          <span class="module-icon">🧠</span>
          <span class="module-text">Denken</span>
        </div>
        <div class="module">
          <span class="module-icon">🛡️</span>
          <span class="module-text">Resilienz</span>
        </div>
        <div class="module">
          <span class="module-icon">⚡</span>
          <span class="module-text">Wirkung</span>
        </div>
      </div>

      <hr class="divider">

      <div class="btn-row">
        <a class="btn-primary" href="https://myablefy.com/s/6heroes/testprodukt-zapier-7ae4eae2/payment" target="_top">
          Jetzt freischalten →
        </a>
        <span class="note">Einmalig · Sofortzugang zu deinem vollständigen Profil</span>
      </div>
    </div>
  </div>
</body>
</html>
