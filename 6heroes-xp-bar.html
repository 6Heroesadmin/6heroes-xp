<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6Heroes XP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a2535;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }
  .card {
    width: 100%;
    max-width: 600px;
    background: #243044;
    border-radius: 16px;
    padding: 24px 28px;
    border: 1px solid rgba(78,205,196,0.3);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }
  .level-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #4ecdc4;
    margin-bottom: 4px;
  }
  .level-name {
    font-size: 28px;
    font-weight: 700;
    color: #ffffff;
  }
  .xp-display { text-align: right; }
  .xp-total {
    font-size: 36px;
    font-weight: 700;
    color: #4ecdc4;
    line-height: 1;
  }
  .xp-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }
  .bar-wrap { margin-bottom: 10px; }
  .bar-track {
    width: 100%;
    height: 12px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #4ecdc4, #45b7d1, #96e6a1);
    width: 0%;
    transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .bar-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .bar-percent { font-size: 14px; font-weight: 700; color: #4ecdc4; }
  .bar-next { font-size: 13px; color: rgba(255,255,255,0.5); }
  .bar-next strong { color: rgba(255,255,255,0.85); }
</style>
</head>
<body>
<div class="card">
  <div class="top-row">
    <div>
      <div class="level-label">Aktuelles Level</div>
      <div class="level-name" id="levelName">Anwärter</div>
    </div>
    <div class="xp-display">
      <div class="xp-total" id="xpTotal">0</div>
      <div class="xp-label">XP gesamt</div>
    </div>
  </div>
  <div class="bar-wrap">
    <div class="bar-track">
      <div class="bar-fill" id="barFill"></div>
    </div>
  </div>
  <div class="bar-footer">
    <div class="bar-percent" id="barPercent">0%</div>
    <div class="bar-next" id="barNext">Noch <strong id="xpNext">100</strong> XP bis nächstes Level</div>
  </div>
</div>
<script>
  const levels = [
    { min:    0, max:  100, name: 'Anwärter' },
    { min:  100, max:  250, name: 'Aushilfsheld' },
    { min:  250, max:  500, name: 'Pfadfinder' },
    { min:  500, max:  900, name: 'Vorreiter' },
    { min:  900, max: 1500, name: 'Aufsteiger' },
    { min: 1500, max: 2500, name: 'Champion' },
    { min: 2500, max: 4000, name: 'Mythos' },
    { min: 4000, max: 6000, name: 'Titan' },
    { min: 6000, max: 9000, name: 'Legende' },
    { min: 9000, max: 9000, name: 'SuperHero' },
  ];
  const xp = parseInt(new URLSearchParams(window.location.search).get('xp') || '0');
  let lvl = levels[0];
  for (let i = levels.length - 1; i >= 0; i--) {
    if (xp >= levels[i].min) { lvl = levels[i]; break; }
  }
  const isMax = lvl.name === 'SuperHero';
  const span = isMax ? 1 : lvl.max - lvl.min;
  const done = isMax ? 1 : xp - lvl.min;
  const pct  = isMax ? 100 : Math.round((done / span) * 100);
  const next = isMax ? 0 : lvl.max - xp;
  document.getElementById('levelName').textContent  = lvl.name;
  document.getElementById('xpTotal').textContent    = xp.toLocaleString('de-DE');
  document.getElementById('barPercent').textContent = pct + '%';
  if (isMax) {
    document.getElementById('barNext').textContent = '🏆 Maximum erreicht!';
  } else {
    document.getElementById('xpNext').textContent = next.toLocaleString('de-DE');
  }
  setTimeout(() => { document.getElementById('barFill').style.width = pct + '%'; }, 100);
</script>
</body>
</html>
