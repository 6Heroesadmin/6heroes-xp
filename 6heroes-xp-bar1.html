<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6Heroes XP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 0;
    margin: 0;
  }
  .card {
    background: linear-gradient(135deg, #0d1b2a 0%, #1b2d45 60%, #0f2235 100%);
    border-radius: 14px;
    padding: 20px 24px 16px;
    border: 1px solid rgba(78,205,196,0.25);
    box-shadow: 0 4px 24px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(78,205,196,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }
  .level-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #4ecdc4;
    margin-bottom: 3px;
  }
  .level-name {
    font-size: 26px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.1;
  }
  .xp-block { text-align: right; }
  .xp-total {
    font-size: 34px;
    font-weight: 800;
    color: #4ecdc4;
    line-height: 1;
    letter-spacing: -1px;
  }
  .xp-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }
  .bar-track {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #4ecdc4 0%, #45b7d1 50%, #96e6a1 100%);
    width: 0%;
    transition: width 1.4s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
  }
  .bar-fill::after {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0; left: 0;
    background: linear-gradient(90deg, transparent 60%, rgba(255,255,255,0.4));
    border-radius: 99px;
  }
  .bar-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .bar-percent {
    font-size: 12px;
    font-weight: 700;
    color: #4ecdc4;
    letter-spacing: 0.5px;
  }
  .bar-next {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
  }
  .bar-next strong { color: rgba(255,255,255,0.8); font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="top-row">
    <div>
      <div class="level-label">Aktuelles Level</div>
      <div class="level-name" id="levelName">Anwärter</div>
    </div>
    <div class="xp-block">
      <div class="xp-total" id="xpTotal">0</div>
      <div class="xp-label">XP gesamt</div>
    </div>
  </div>
  <div class="bar-track">
    <div class="bar-fill" id="barFill"></div>
  </div>
  <div class="bar-footer">
    <div class="bar-percent" id="barPercent">0%</div>
    <div class="bar-next" id="barNext">Noch <strong id="xpNext">100</strong> XP bis nächstes Level</div>
  </div>
</div>
<script>
  const levels = [
    { min:    0, max:  100, name: 'Anwärter' },
    { min:  100, max:  250, name: 'Aushilfsheld' },
    { min:  250, max:  500, name: 'Pfadfinder' },
    { min:  500, max:  900, name: 'Vorreiter' },
    { min:  900, max: 1500, name: 'Aufsteiger' },
    { min: 1500, max: 2500, name: 'Champion' },
    { min: 2500, max: 4000, name: 'Mythos' },
    { min: 4000, max: 6000, name: 'Titan' },
    { min: 6000, max: 9000, name: 'Legende' },
    { min: 9000, max: 9000, name: 'SuperHero' },
  ];
  const xp = parseInt(new URLSearchParams(window.location.search).get('xp') || '0');
  let lvl = levels[0];
  for (let i = levels.length - 1; i >= 0; i--) {
    if (xp >= levels[i].min) { lvl = levels[i]; break; }
  }
  const isMax = lvl.name === 'SuperHero';
  const pct  = isMax ? 100 : Math.round(((xp - lvl.min) / (lvl.max - lvl.min)) * 100);
  const next = isMax ? 0 : lvl.max - xp;
  document.getElementById('levelName').textContent  = lvl.name;
  document.getElementById('xpTotal').textContent    = xp.toLocaleString('de-DE');
  document.getElementById('barPercent').textContent = pct + '%';
  if (isMax) {
    document.getElementById('barNext').textContent = '🏆 Maximum erreicht!';
  } else {
    document.getElementById('xpNext').textContent = next.toLocaleString('de-DE');
  }
  setTimeout(() => { document.getElementById('barFill').style.width = pct + '%'; }, 150);
</script>
</body>
</html>
