<!DOCTYPE html>
<html lang="de">
<head><meta charset="UTF-8"><title>6Heroes Profil-Rad</title>
<style>
  body{margin:0;background:transparent;display:flex;flex-direction:column;align-items:center;padding:8px 16px 10px;font-family:sans-serif;color:#1a1a2e;}
  canvas{display:block;}
  #legend{display:grid;grid-template-columns:repeat(3,1fr);gap:6px 20px;font-size:11px;margin-top:8px;max-width:300px;width:100%;}
  #caption{font-size:11px;margin-top:6px;max-width:300px;width:100%;text-align:center;color:#374151;line-height:1.5;}
  .badge{font-size:9px;padding:1px 4px;border-radius:3px;color:#fff;font-weight:700;display:inline-block;}
</style>
</head>
<body>
<canvas id="heroCanvas" width="340" height="340"></canvas>
<div id="legend"></div>
<div id="caption"></div>
<script>
const HEROES=[
  {name:'Innovator', score:88,color:'#F2B705'},
  {name:'Commander', score:83,color:'#0B63CE'},
  {name:'Strategist',score:67,color:'#334155'},
  {name:'Sage',      score:58,color:'#C0266A'},
  {name:'Guardian',  score:63,color:'#1F9D62'},
  {name:'Explorer',  score:79,color:'#F0672A'},
];
const PROFILE={base:'Strategist',second:'Commander',stress1:'Commander',stress2:'Commander'};
const LABEL_R_OVERRIDE={'Commander':0.70};
const N=6,SWEEP=Math.PI*2/N;
let mode='free',logoImg=null;
const LOGO_B64="iVBORw0KGgoAAAANSUhEUgAAAMgAAADICAIAAAAiOjnJAACiDUlEQVR42u19d6BtV1k2";

function getParams(){
  const p=new URLSearchParams(window.location.search);
  if(p.get('mode'))mode=p.get('mode');
  const names=['Innovator','Commander','Strategist','Sage','Guardian','Explorer'];
  const keys=['si','sc','ss','sa','sg','se'];
  keys.forEach((k,i)=>{if(p.get(k))HEROES[i].score=parseInt(p.get(k));});
  if(p.get('b'))PROFILE.base=names.find(n=>n.toLowerCase()===p.get('b').toLowerCase())||PROFILE.base;
  if(p.get('z'))PROFILE.second=names.find(n=>n.toLowerCase()===p.get('z').toLowerCase())||PROFILE.second;
  if(p.get('s1'))PROFILE.stress1=names.find(n=>n.toLowerCase()===p.get('s1').toLowerCase())||PROFILE.stress1;
  if(p.get('s2'))PROFILE.stress2=names.find(n=>n.toLowerCase()===p.get('s2').toLowerCase())||PROFILE.stress2;
}
getParams();

const img=new Image();
img.onload=()=>{logoImg=img;draw();};
// Use a simple placeholder logo approach - fetch from GitHub Pages
img.src='https://6heroesadmin.github.io/6heroes-xp/logo.png';
img.onerror=()=>{draw();};

function hexRgb(h){return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;}
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function draw(){
  const cv=document.getElementById('heroCanvas'),ctx=cv.getContext('2d');
  const W=340,H=340,cx=170,cy=170,outerR=150,innerR=48,rW=outerR-innerR;
  ctx.clearRect(0,0,W,H);
  const ma={};
  HEROES.forEach((hero,i)=>{
    const sa=-Math.PI/2+i*SWEEP,ea=sa+SWEEP,mid=sa+SWEEP/2;
    ma[hero.name]=mid;
    const isBase=hero.name===PROFILE.base,gray=mode==='free'&&!isBase;
    const rgb=hexRgb(gray?'#707070':hero.color);
    const fR=innerR+rW*(hero.score/100);
    ctx.beginPath();ctx.moveTo(cx+Math.cos(sa)*innerR,cy+Math.sin(sa)*innerR);ctx.arc(cx,cy,outerR,sa,ea);ctx.arc(cx,cy,innerR,ea,sa,true);ctx.closePath();
    ctx.fillStyle=`rgba(${rgb},${gray?0.11:0.18})`;ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+Math.cos(sa)*innerR,cy+Math.sin(sa)*innerR);ctx.arc(cx,cy,fR,sa,ea);ctx.arc(cx,cy,innerR,ea,sa,true);ctx.closePath();
    ctx.fillStyle=gray?`rgba(${rgb},0.38)`:hero.color;ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+Math.cos(sa)*innerR,cy+Math.sin(sa)*innerR);ctx.lineTo(cx+Math.cos(sa)*outerR,cy+Math.sin(sa)*outerR);
    ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=2;ctx.stroke();
    const lr=(LABEL_R_OVERRIDE[hero.name]!==undefined?LABEL_R_OVERRIDE[hero.name]:0.52);
    const lR=innerR+rW*lr,lx=cx+Math.cos(mid)*lR,ly=cy+Math.sin(mid)*lR;
    ctx.save();ctx.translate(lx,ly);ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=gray?'rgba(255,255,255,0.28)':'rgba(255,255,255,0.95)';
    ctx.font=`${isBase?'bold ':''}11px sans-serif`;ctx.fillText(hero.name,0,0);ctx.restore();
  });

  // Draw center circle
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,innerR,0,Math.PI*2);
  if(logoImg&&logoImg.complete&&logoImg.naturalWidth){
    ctx.clip();
    ctx.drawImage(logoImg,cx-innerR,cy-innerR,innerR*2,innerR*2);
  } else {
    ctx.fillStyle='#2a2a4e';ctx.fill();
    // Draw 6H text
    ctx.fillStyle='#fff';ctx.font='bold 22px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('6H',cx,cy);
  }
  ctx.restore();
  ctx.beginPath();ctx.arc(cx,cy,innerR,0,Math.PI*2);ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=2;ctx.stroke();

  function iMark(angle,hName,lbl){
    const h=HEROES.find(x=>x.name===hName);if(!h)return;
    const r=innerR+14,mx=cx+Math.cos(angle)*r,my=cy+Math.sin(angle)*r;
    ctx.beginPath();ctx.arc(mx,my,12,0,Math.PI*2);ctx.fillStyle=h.color;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.7)';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(lbl,mx,my);
  }
  function oBadge(hName,lbl,off){
    const a=ma[hName]+(off||0),r=innerR+rW*0.89,lx=cx+Math.cos(a)*r,ly=cy+Math.sin(a)*r;
    ctx.fillStyle='#BB1111';rr(ctx,lx-13,ly-8,26,16,4);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 8px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(lbl,lx,ly);
  }
  iMark(ma[PROFILE.base],PROFILE.base,'B');
  if(mode==='full'){
    if(PROFILE.second===PROFILE.base)iMark(ma[PROFILE.second]+SWEEP*0.25,PROFILE.second,'Z');
    else iMark(ma[PROFILE.second],PROFILE.second,'Z');
    if(PROFILE.stress1===PROFILE.stress2){oBadge(PROFILE.stress1,'S1',-SWEEP*0.18);oBadge(PROFILE.stress2,'S2',SWEEP*0.18);}
    else{oBadge(PROFILE.stress1,'S1',0);oBadge(PROFILE.stress2,'S2',0);}
  }

  const leg=document.getElementById('legend');
  leg.innerHTML=HEROES.map(h=>{
    const show=mode==='full'||h.name===PROFILE.base;
    const b=[];
    if(h.name===PROFILE.base)b.push({l:'B',c:h.color});
    if(mode==='full'){
      if(h.name===PROFILE.second)b.push({l:'Z',c:h.color});
      if(PROFILE.stress1===PROFILE.stress2&&h.name===PROFILE.stress1)b.push({l:'S1+S2',c:'#BB1111'});
      else{if(h.name===PROFILE.stress1)b.push({l:'S1',c:'#BB1111'});if(h.name===PROFILE.stress2)b.push({l:'S2',c:'#BB1111'});}
    }
    return `<div style="display:flex;align-items:center;gap:5px;opacity:${show?1:.35}">
      <div style="width:9px;height:9px;border-radius:50%;background:${h.color};flex-shrink:0"></div>
      <span style="color:rgba(30,30,50,0.75)">${h.name}</span>
      ${b.map(x=>`<span class="badge" style="background:${x.c}">${x.l}</span>`).join('')}
    </div>`;
  }).join('');

  const cap=document.getElementById('caption');
  if(cap){
    cap.innerHTML=mode==='free'
      ?`Dein Basisheld ist der <strong>${PROFILE.base}</strong>.<br>Schalte dein vollständiges Profil frei → alle Archetypen + Bedeutung.`
      :'<strong>B/Z</strong> innerer Rand · <span style="color:#BB1111;font-weight:700">S1/S2</span> äußerer Rand';
  }
}
draw();
</script>
</body></html>
